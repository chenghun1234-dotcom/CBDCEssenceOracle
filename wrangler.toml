name = "cbdcessenceracle"
main = "src/index.js"
compatibility_date = "2024-04-28"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────
# Cloudflare Workers 무료 플랜 설정
# - 일 100,000 요청 무료
# - CPU 시간 10ms/요청 무료
# ─────────────────────────────────────────────

# KV 네임스페이스 (환율/시세 캐싱용 - 무료 플랜: 1GB)
[[kv_namespaces]]
binding = "GEPA_KV"
id = "55cc389bb16e46648c1db97c4acb11c5"
preview_id = "YOUR_KV_PREVIEW_ID"

# D1 데이터베이스 (시세 트렌드 저장용 - 무료 플랜: 5GB)
[[d1_databases]]
binding = "DB"
database_name = "gepa_db"
database_id = "YOUR_D1_DATABASE_ID"    # `wrangler d1 create gepa_db` 실행 후 ID 입력

# 스케줄러 (공공 API 데이터 자동 수집 - 매일 새벽 5시)
[triggers]
crons = ["0 5 * * *"]

# 환경변수 (민감하지 않은 것만 여기에)
[vars]
ENVIRONMENT = "production"
UCU_BASE = "USD"
CACHE_TTL_SECONDS = "21600"

# 민감 환경변수는 `wrangler secret put` 명령으로 설정:
# wrangler secret put RAPIDAPI_HOST
# wrangler secret put DEV_SECRET

# ─────────────────────────────────────────────
# 로컬 개발 환경
# ─────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

# ─────────────────────────────────────────────
# 스테이징 환경 (선택)
# ─────────────────────────────────────────────
[env.staging]
name = "gepa-api-staging"
vars = { ENVIRONMENT = "staging" }
